<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Comercial - Kepler-186f</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 900px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 5px;
            color: var(--text-color);
            font-size: 24px;
        }

        p.subtitle {
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 14px;
            font-weight: 500;
        }

        form {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
            flex-wrap: wrap;
            background-color: var(--bg-color);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        select, input, button {
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            background-color: var(--container-bg);
            color: var(--text-color);
        }

        select:focus, input:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: #0f172a;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
            padding: 10px 20px;
        }

        button:hover {
            opacity: 0.9;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border-bottom: 1px solid var(--border);
            padding: 15px 12px;
            text-align: left;
        }

        th {
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .badge {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Painel de Flutuação: Kepler-186f</h1>
        <p class="subtitle">Desenvolvido por: Gab Solano</p>

        <form action="/processar" method="POST">
            <select name="evento" id="evento" required>
                <option value="" disabled selected>Selecione o Evento</option>
                <option value="RADIACAO">Tempestade de Radiação</option>
                <option value="DESCOBERTA_MINA">Descoberta de Mina</option>
            </select>

            <select name="setor" id="setor" required>
                <option value="" disabled selected>Selecione o Setor</option>
                <option value="MINERAL">MINERAL</option>
                <option value="COMBUSTIVEL">COMBUSTIVEL</option>
                <option value="DADOS">DADOS</option>
            </select>

            <input type="number" name="valor" id="valor" value="10" step="0.1" required style="width: 90px;"
                title="Porcentagem de Flutuação">

            <button type="submit">Aplicar Alteração</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Cód.</th>
                    <th>Ativo Comercial</th>
                    <th>Setor</th>
                    <th>Cotação Atual</th>
                    <th>Estoque</th>
                </tr>
            </thead>
            <tbody>
                {% for ativo in ativos %}
                <tr>
                    <td>{{ ativo[0] }}</td>
                    <td><strong>{{ ativo[1] }}</strong></td>
                    <td><span class="badge">{{ ativo[2] }}</span></td>
                    <td>Cr$ {{ "%.2f"|format(ativo[3]) }}</td>
                    <td>{{ ativo[4] }} un.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>

</html>
